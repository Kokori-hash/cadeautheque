<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1a0a02">
<title>La Cadeauthèque — Famille</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --fd:'Fraunces',serif;
  --fb:'Inter',system-ui,sans-serif;
  --bg:#1a0a02;
  --bg2:#2a1206;
  --o1:#ff7a18;     /* orange vif */
  --o2:#ffb347;     /* abricot */
  --o3:#ffd9a8;     /* crème */
  --o4:#ff5722;     /* deep coral */
  --ink:#fff4e6;
  --ink-dim:rgba(255,244,230,.55);
  --ink-mute:rgba(255,244,230,.32);
  --line:rgba(255,148,46,.14);
  --glass:rgba(42,18,6,.72);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--fb);
  font-size:15px;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,122,24,.35),transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%,rgba(255,87,34,.18),transparent 60%),
    radial-gradient(ellipse 50% 30% at 0% 60%,rgba(255,179,71,.10),transparent 60%);
}
button,input,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,122,24,.25);border-radius:3px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

/* ═════ ANIMATIONS ═════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(3deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0}}
@keyframes cardOut{to{opacity:0;transform:scale(.85) translateX(40px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px) scale(.95)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 20px rgba(255,122,24,.4))}50%{filter:drop-shadow(0 0 35px rgba(255,179,71,.7))}}

/* ═════ AMBIENT BG ═════ */
.grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.12;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.5}
.orb.o1{width:340px;height:340px;background:radial-gradient(circle,#ff7a18,transparent 60%);top:-80px;right:-60px;animation:float 12s ease-in-out infinite}
.orb.o2{width:280px;height:280px;background:radial-gradient(circle,#ff5722,transparent 60%);bottom:10%;left:-80px;animation:float 14s ease-in-out infinite reverse}

/* ═════ LOADER ═════ */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:18px;transition:opacity .5s}
.loader.hidden{opacity:0;pointer-events:none}
.loader .ic{font-size:54px;animation:glow 2s ease-in-out infinite}
.loader p{font-size:12px;color:var(--ink-mute);letter-spacing:.1em;text-transform:uppercase}

/* ═════ TOASTS ═════ */
.toasts{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:8000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:100%;padding:0 16px}
.toast{pointer-events:auto;padding:12px 18px;border-radius:14px;font-size:13px;backdrop-filter:blur(20px);box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;animation:toastIn .35s cubic-bezier(.34,1.56,.64,1);max-width:100%;font-weight:500}
.toast.removing{animation:toastOut .25s ease forwards}
.toast.success{background:rgba(255,122,24,.18);border:1px solid rgba(255,122,24,.4);color:var(--o2)}
.toast.error{background:rgba(255,87,34,.2);border:1px solid rgba(255,87,34,.45);color:#ff8a65}
.toast.undo{background:rgba(255,179,71,.16);border:1px solid rgba(255,179,71,.35);color:var(--o2);position:relative;overflow:hidden}
.toast .ub{background:rgba(255,255,255,.12);border:none;color:inherit;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.toast .ubar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--o2);transform-origin:left;animation:undoBar 5s linear forwards}
@keyframes undoBar{to{transform:scaleX(0)}}

/* ═════ HEADER ═════ */
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:32px 14px 80px}
.hdr{text-align:center;margin-bottom:22px;animation:fadeUp .8s cubic-bezier(.16,1,.3,1)}
.hdr .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(255,122,24,.08);border:1px solid rgba(255,122,24,.18);border-radius:30px;margin-bottom:14px;font-size:11px;color:var(--o2);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.hdr .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--o1);box-shadow:0 0 12px var(--o1);animation:pulse 2s ease-in-out infinite}
.hdr h1{font-family:var(--fd);font-size:clamp(38px,11vw,76px);font-weight:900;letter-spacing:-.04em;line-height:.95;margin-bottom:8px;font-variation-settings:"opsz" 144}
.hdr h1 .grad{background:linear-gradient(135deg,#fff 0%,var(--o2) 30%,var(--o1) 55%,var(--o4) 75%,var(--o2) 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s linear infinite;display:inline-block}
.hdr h2{font-family:var(--fd);font-size:clamp(12px,3vw,16px);font-weight:400;font-style:italic;color:var(--ink-mute);max-width:520px;margin:0 auto 6px}

/* ═════ FILTER CHIPS ═════ */
.filter{display:flex;gap:8px;overflow-x:auto;padding:4px 14px 8px;margin:0 -14px 12px;scrollbar-width:none;animation:fadeUp .8s .08s both}
.filter::-webkit-scrollbar{display:none}
.filter button{flex-shrink:0;padding:9px 14px;border-radius:30px;border:1px solid var(--line);background:rgba(42,18,6,.6);backdrop-filter:blur(10px);color:var(--ink-dim);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.filter button .e{font-size:14px;display:inline-flex;align-items:center}
.filter button .e img{width:16px;height:16px;border-radius:50%}
.filter button.act{background:linear-gradient(135deg,var(--o1),var(--o4));border-color:var(--o1);color:#fff;box-shadow:0 6px 18px rgba(255,87,34,.35)}
.filter button:active{transform:scale(.95)}

/* ═════ SEARCH ═════ */
.search{position:relative;max-width:480px;margin:18px auto 24px;animation:fadeUp .8s .1s both}
.search input{width:100%;padding:14px 44px 14px 44px;border-radius:16px;border:1px solid var(--line);background:rgba(42,18,6,.5);backdrop-filter:blur(12px);color:var(--ink);font-size:15px;outline:none;transition:all .25s}
.search input::placeholder{color:var(--ink-mute)}
.search input:focus{border-color:var(--o1);background:rgba(42,18,6,.7);box-shadow:0 0 0 4px rgba(255,122,24,.1)}
.search .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5;pointer-events:none}
.search .cs{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(255,122,24,.15);border:none;color:var(--o2);width:32px;height:32px;border-radius:10px;cursor:pointer;font-size:14px;display:none}
.search .cs.show{display:block}

/* ═════ GRID ═════ */
.grid{display:grid;grid-template-columns:1fr;gap:18px;animation:fadeUp .8s .15s both}

/* ═════ COLUMN ═════ */
.col{position:relative;background:linear-gradient(180deg,rgba(42,18,6,.85),rgba(26,10,2,.6));border:1px solid var(--line);border-radius:24px;padding:18px;backdrop-filter:blur(14px);overflow:hidden}
.col::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--ac,var(--o1)),transparent);opacity:.7}
.col-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;position:relative}
.col-info{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.col-em{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:linear-gradient(135deg,var(--ac,var(--o1))22,var(--ac,var(--o1))08);border:1px solid var(--ac,var(--o1));box-shadow:0 8px 24px rgba(0,0,0,.3)}
.col-em img{width:100%;height:100%;border-radius:13px;object-fit:cover}
.col-meta{min-width:0;flex:1}
.col-name{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.1;color:#fff;font-variation-settings:"opsz" 144}
.col-role{font-size:11px;color:var(--ink-mute);font-weight:400;font-style:italic}
.col-stats{display:flex;align-items:center;gap:8px;margin-top:3px;font-size:11px;color:var(--ink-mute)}
.col-stats .b{padding:2px 8px;border-radius:20px;background:var(--ac,var(--o1))15;color:var(--ac,var(--o2));font-weight:600}
.sort{padding:9px 12px;border-radius:11px;border:1px solid var(--line);background:rgba(255,122,24,.05);color:var(--ink-dim);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500}
.sort:active{background:rgba(255,122,24,.15)}
.sort .a{font-size:8px;opacity:.5}

.add{width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--ac,var(--o1)),var(--ac2,var(--o4)));color:#fff;border:none;box-shadow:0 8px 24px rgba(255,87,34,.3);transition:all .25s;margin-bottom:14px}
.add:active{transform:scale(.97);box-shadow:0 4px 12px rgba(255,87,34,.4)}
.add .p{font-size:18px;font-weight:800;line-height:1}

/* ═════ SCROLLABLE CARDS ═════ */
.cards-wrap{position:relative}
.cards{display:flex;flex-direction:column;gap:10px;max-height:62vh;overflow-y:auto;padding:2px 4px 20px 2px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:rgba(255,122,24,.3) transparent}
.cards.short{max-height:none}
.cards-wrap::after{content:"";position:absolute;left:0;right:0;bottom:0;height:30px;background:linear-gradient(transparent,rgba(26,10,2,.95));pointer-events:none;border-radius:0 0 18px 18px;opacity:0;transition:opacity .2s}
.cards-wrap.scrollable::after{opacity:1}

/* ═════ CARD ═════ */
.card{display:flex;gap:12px;padding:12px;border-radius:16px;background:rgba(255,244,230,.03);border:1px solid var(--line);position:relative;transition:all .25s;animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;overflow:hidden}
.card.removing{animation:cardOut .35s ease forwards}
.card.search-hidden{display:none}
.card:active{transform:scale(.99);background:rgba(255,244,230,.05)}
.card .thumb{flex-shrink:0;width:84px;height:84px;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,rgba(255,122,24,.12),rgba(255,87,34,.06));display:flex;align-items:center;justify-content:center;position:relative}
.card .thumb img{width:100%;height:100%;object-fit:cover}
.card .thumb .ph{font-size:30px;opacity:.4}
.card .body{flex:1;min-width:0;display:flex;flex-direction:column}
.card h4{font-family:var(--fd);font-size:16px;font-weight:700;color:#fff;line-height:1.25;padding-right:84px;letter-spacing:-.01em;font-variation-settings:"opsz" 144}
.card .desc{font-size:12px;color:var(--ink-dim);line-height:1.45;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .foot{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:8px;flex-wrap:wrap}
.card .price{font-size:13px;font-weight:700;color:var(--o2);background:rgba(255,122,24,.12);padding:3px 10px;border-radius:20px;border:1px solid rgba(255,122,24,.25)}
.card .lk{display:inline-flex;align-items:center;gap:4px;font-size:11px;text-decoration:none;padding:4px 10px;border-radius:20px;color:var(--o2);background:rgba(255,179,71,.1);border:1px solid rgba(255,179,71,.2);font-weight:500}
.card .lk:active{background:rgba(255,179,71,.2)}
.card .edt{position:absolute;top:8px;right:46px;width:30px;height:30px;border-radius:9px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.08);color:var(--ink-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:all .2s}
.card .edt:active{background:rgba(255,179,71,.6);color:#fff;transform:scale(.92)}
.card .del{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:9px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.08);color:var(--ink-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:all .2s}
.card .del:active{background:rgba(255,87,34,.7);color:#fff;transform:scale(.92)}

.empty{padding:30px 16px;text-align:center;color:var(--ink-mute);font-size:13px;border:1px dashed rgba(255,122,24,.15);border-radius:14px}
.empty .ei{font-size:34px;margin-bottom:8px;display:block;opacity:.6}

/* ═════ SORT MENU ═════ */
.sort-menu{position:fixed;z-index:9999;background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:6px;min-width:200px;box-shadow:0 20px 60px rgba(0,0,0,.6);backdrop-filter:blur(20px);animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
.sort-menu .lbl{padding:6px 12px 4px;font-size:9px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.1em}
.sort-menu button{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:10px;border:none;background:transparent;color:var(--ink-dim);font-size:13px;cursor:pointer;text-align:left;min-height:44px}
.sort-menu button:active,.sort-menu button.active{background:rgba(255,122,24,.12);color:var(--o2)}
.sort-menu button .ck{margin-left:auto;color:var(--o1)}

/* ═════ MODAL (bottom sheet on mobile) ═════ */
.mo{position:fixed;inset:0;z-index:5000;display:none;align-items:flex-end;justify-content:center}
.mo.show{display:flex;animation:fadeIn .25s}
.mbg{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px)}
.modal{position:relative;background:linear-gradient(180deg,#2a1206,#1a0a02);border:1px solid var(--line);border-top:1px solid rgba(255,179,71,.3);border-radius:28px 28px 0 0;padding:22px 20px max(22px,env(safe-area-inset-bottom));width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.6);animation:slideUp .35s cubic-bezier(.16,1,.3,1)}
.modal::before{content:"";display:block;width:42px;height:4px;border-radius:2px;background:rgba(255,179,71,.35);margin:0 auto 16px}
.modal h3{font-family:var(--fd);font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;font-variation-settings:"opsz" 144}
.modal .sub{font-size:12px;color:var(--ink-mute);margin-bottom:16px}
.modal .who{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.modal .who button{padding:8px 12px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink-dim);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.modal .who button.sel{background:linear-gradient(135deg,var(--o1),var(--o4));border-color:var(--o1);color:#fff;box-shadow:0 6px 18px rgba(255,87,34,.35)}
.modal .who button .e{font-size:14px}
.modal .who button .e img{width:16px;height:16px;border-radius:50%;vertical-align:middle}
.dz{border:2px dashed rgba(255,179,71,.25);border-radius:14px;height:80px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:all .25s;background:rgba(255,122,24,.03)}
.dz.hi{height:160px}
.dz.drg{border-color:var(--o1);background:rgba(255,122,24,.08)}
.dz img{width:100%;height:100%;object-fit:cover}
.dz .ph{color:var(--ink-mute);font-size:13px;text-align:center;padding:0 12px}
.img-info{font-size:10px;color:var(--ink-mute);text-align:center;margin:-4px 0 10px}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:10px;color:var(--ink-mute);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.fld input,.fld textarea{width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);background:rgba(255,244,230,.04);color:var(--ink);font-size:16px;outline:none;transition:all .2s}
.fld input:focus,.fld textarea:focus{border-color:var(--o1);background:rgba(255,122,24,.06);box-shadow:0 0 0 3px rgba(255,122,24,.08)}
.fld textarea{resize:vertical;font-size:14px;min-height:60px}
.modal .ma{display:flex;gap:10px;margin-top:14px}
.modal .bc{flex:1;padding:14px;border-radius:13px;border:1px solid var(--line);background:transparent;color:var(--ink-dim);font-size:14px;font-weight:600;cursor:pointer}
.modal .ba{flex:2;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--o1),var(--o4));color:#fff;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(255,87,34,.35)}
.modal .ba:active,.modal .bc:active{transform:scale(.97)}
.modal.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

/* ═════ CONFETTI ═════ */
.confetti{position:fixed;left:50%;top:50%;z-index:7000;pointer-events:none}
.confetti span{position:absolute;animation:burst 1.1s cubic-bezier(.16,1,.3,1) forwards}

footer{text-align:center;margin-top:32px;font-size:10px;color:var(--ink-mute);letter-spacing:.08em}

/* ═════ TABLET / DESKTOP ═════ */
@media(min-width:680px){
  .wrap{padding:48px 24px 80px}
  .grid{grid-template-columns:repeat(2,1fr);gap:22px}
  .col{padding:22px}
  .cards{max-height:58vh}
  .modal{border-radius:24px;max-width:520px;margin:0 auto;align-self:center}
  .mo{align-items:center;padding:20px}
  .modal::before{display:none}
}
@media(min-width:1024px){
  .grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1320px){
  .grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ic">🎁</div><p>Cadeauthèque</p></div>
<div class="grain"></div>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="confetti" id="confetti"></div>
<div class="toasts" id="toasts"></div>

<div class="wrap">
  <header class="hdr">
    <div class="pill"><span class="dot"></span>Liste de cadeaux famille</div>
    <h1><span class="grad">Cadeauthèque</span></h1>
    <h2>Kelly · Théo · Corinne · Christelle · Jérôme · Mano · Maeva</h2>
  </header>
  <div class="filter" id="filter"></div>
  <div class="search">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Rechercher un cadeau..." autocomplete="off">
    <button class="cs" id="cs-btn">✕</button>
  </div>
  <div class="grid" id="grid"></div>
  <footer>Fait avec ✦ par la famille — <span id="yr"></span></footer>
</div>

<div class="mo" id="mo">
  <div class="mbg" onclick="closeModal()"></div>
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <h3 id="m-t">Ajouter un cadeau</h3>
    <p class="sub">Pour qui ?</p>
    <div class="who" id="m-who"></div>
    <div class="dz" id="m-dz" onclick="document.getElementById('m-f').click()">
      <span class="ph" id="m-ph">📷 Glisse une image ou clique</span>
      <img id="m-pv" style="display:none" alt="">
      <input type="file" id="m-f" accept="image/*" style="display:none">
    </div>
    <div class="img-info" id="m-img-info"></div>
    <div class="fld"><label>Nom du cadeau *</label><input type="text" id="m-name" placeholder="Ex : Montre Seiko Presage" maxlength="100"></div>
    <div class="fld"><label>Prix (€)</label><input type="number" id="m-price" placeholder="Ex : 350" step="0.01" min="0"></div>
    <div class="fld"><label>Lien</label><input type="text" id="m-link" placeholder="https://..."></div>
    <div class="fld"><label>Description</label><textarea id="m-desc" rows="2" placeholder="Pourquoi tu en rêves..." maxlength="500"></textarea></div>
    <div class="ma"><button class="bc" onclick="closeModal()">Annuler</button><button class="ba" id="m-ok">✦ Ajouter</button></div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import{getFirestore,doc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDve747b_1H2W-3j9UBhXcNVkslRTwVeM0",authDomain:"cadeautheque-3235a.firebaseapp.com",projectId:"cadeautheque-3235a",storageBucket:"cadeautheque-3235a.firebasestorage.app",messagingSenderId:"1092752283046",appId:"1:1092752283046:web:b35728828acd5179ee6b67"});
const db=getFirestore(app);

const PSG="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%23004170'/%3E%3Ctext x='20' y='26' text-anchor='middle' fill='white' font-size='13' font-weight='bold'%3EPsg%3C/text%3E%3C/svg%3E";
const USERS={
  kelly:{name:"Kelly",emoji:"🌵",color:"#ffb347",color2:"#ff7a18"},
  theo:{name:"Théo",emoji:"💻",color:"#ff9341",color2:"#ff5722"},
  corinne:{name:"Corinne",emoji:"🌸",color:"#ffa07a",color2:"#ff6f3c",role:"Maman Théo"},
  christelle:{name:"Christelle",emoji:"💜",color:"#ffb380",color2:"#e85a1a",role:"Maman Kelly"},
  jerome:{name:"Jérôme",emoji:PSG,color:"#ffc47a",color2:"#ff8a3d",role:"Papa Kelly",isImg:true},
  mano:{name:"Mano",emoji:"🎧",color:"#ff9050",color2:"#e85a1a"},
  maeva:{name:"Maeva",emoji:"🦋",color:"#ffa56b",color2:"#ff6b1a",role:"Sœur de Kelly"},
};
const UK=Object.keys(USERS);
let gifts={},sorts={},searchQuery="",mPerson=null,mImg=null,openMK=null,filterPerson=null,editingId=null;
UK.forEach(k=>{gifts[k]=[];sorts[k]="newest"});

const $=s=>document.getElementById(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmt=n=>(n!=null&&n!=="")?Number(n).toFixed(2)+" €":"";
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const eH=u=>u.isImg?`<img src="${u.emoji}">`:u.emoji;

/* ═══ TOASTS ═══ */
function toast(msg,type="success",duration=3500){
  const t=document.createElement("div");
  t.className=`toast ${type}`;
  t.innerHTML=msg;
  $("toasts").appendChild(t);
  setTimeout(()=>{t.classList.add("removing");setTimeout(()=>t.remove(),300)},duration);
  return t;
}

/* ═══ IMAGE COMPRESSION ═══ */
const MAX_W=400,MAX_Q=.65,MAX_SIZE=40000;
function compressImage(file){
  return new Promise((resolve,reject)=>{
    if(!file||!file.type.startsWith("image/")){resolve(null);return}
    if(file.size>10*1024*1024){reject(new Error("Image trop lourde (max 10 Mo)"));return}
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const c=document.createElement("canvas");
      let w=img.width,h=img.height;
      if(w>MAX_W){h=Math.round(h*(MAX_W/w));w=MAX_W}
      c.width=w;c.height=h;
      const ctx=c.getContext("2d");ctx.drawImage(img,0,0,w,h);
      let q=MAX_Q,r=c.toDataURL("image/jpeg",q);
      while(r.length>MAX_SIZE&&q>.2){q-=.1;r=c.toDataURL("image/jpeg",q)}
      if(r.length>MAX_SIZE){const ra=.6;c.width=Math.round(w*ra);c.height=Math.round(h*ra);ctx.drawImage(img,0,0,c.width,c.height);r=c.toDataURL("image/jpeg",.3)}
      resolve(r);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("Image illisible"))};
    img.src=url;
  });
}

/* ═══ FIREBASE ═══ */
const gRef=doc(db,"cadeautheque","gifts");
function recompressDataUrl(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      let w=img.width,h=img.height;
      if(w>MAX_W){h=Math.round(h*(MAX_W/w));w=MAX_W}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      let q=MAX_Q,r=c.toDataURL("image/jpeg",q);
      while(r.length>MAX_SIZE&&q>.2){q-=.1;r=c.toDataURL("image/jpeg",q)}
      resolve(r);
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}
async function shrinkAllImages(){
  let changed=false;
  for(const k of UK){
    for(const it of (gifts[k]||[])){
      if(it.img&&it.img.length>MAX_SIZE+2000){
        const nw=await recompressDataUrl(it.img);
        if(nw&&nw.length<it.img.length){it.img=nw;changed=true}
      }
    }
  }
  return changed;
}
async function saveG(){
  try{
    let data=JSON.stringify(gifts);
    if(new Blob([data]).size/1024>900){
      const t=toast("⏳ Optimisation des images…","success",2000);
      await shrinkAllImages();
      data=JSON.stringify(gifts);
    }
    if(new Blob([data]).size/1024>950){toast("⚠️ Données trop volumineuses","error",5000);return false}
    await setDoc(gRef,{data});
    return true;
  }catch(e){console.error(e);toast("❌ Erreur de sauvegarde","error");return false}
}
onSnapshot(gRef,snap=>{
  if(snap.exists()){try{const d=JSON.parse(snap.data().data);UK.forEach(k=>{gifts[k]=d[k]||[]});renderAll()}catch(e){console.error(e)}}
  hideLoader();
});

/* ═══ CONFETTI ═══ */
function burst(){
  const el=$("confetti");el.innerHTML="";
  const es=["✦","🎁","✨","🌟","🧡","💛"];
  for(let i=0;i<22;i++){
    const sp=document.createElement("span"),a=(i/22)*360,d=50+Math.random()*120;
    sp.style.cssText=`font-size:${14+Math.random()*14}px;--bx:${Math.cos(a*Math.PI/180)*d}px;--by:${Math.sin(a*Math.PI/180)*d}px`;
    sp.textContent=es[i%es.length];el.appendChild(sp);
  }
  setTimeout(()=>el.innerHTML="",1500);
}

/* ═══ SEARCH ═══ */
$("search").oninput=function(){
  searchQuery=this.value.trim().toLowerCase();
  $("cs-btn").classList.toggle("show",searchQuery.length>0);
  applySearch();
};
$("cs-btn").onclick=()=>{$("search").value="";searchQuery="";$("cs-btn").classList.remove("show");applySearch()};
function applySearch(){
  document.querySelectorAll(".card[data-name]").forEach(c=>{
    if(!searchQuery){c.classList.remove("search-hidden");return}
    const m=(c.dataset.name||"").includes(searchQuery)||(c.dataset.desc||"").includes(searchQuery);
    c.classList.toggle("search-hidden",!m);
  });
  document.querySelectorAll(".cards-wrap").forEach(updateScrollIndicator);
}

/* ═══ SORT ═══ */
window.openSort=function(p,ev){
  ev.stopPropagation();
  if(openMK===p){closeSort();return}
  closeSort();openMK=p;
  const r=ev.currentTarget.getBoundingClientRect();
  const opts=[{v:"newest",l:"Plus récent",i:"🕐"},{v:"oldest",l:"Plus ancien",i:"🕰️"},{v:"price-asc",l:"Prix ↑",i:"💶"},{v:"price-desc",l:"Prix ↓",i:"💸"},{v:"alpha",l:"A → Z",i:"🔤"}];
  const m=document.createElement("div");m.className="sort-menu";m.id="sort-menu";
  let top=r.bottom+6,left=Math.max(8,r.right-208);
  if(top+260>window.innerHeight)top=Math.max(8,r.top-265);
  m.style.top=top+"px";m.style.left=Math.min(left,window.innerWidth-212)+"px";
  let h=`<div class="lbl">Trier</div>`;
  opts.forEach(o=>{const a=sorts[p]===o.v;h+=`<button class="${a?"active":""}" data-v="${o.v}">${o.i} ${o.l}${a?'<span class="ck">✓</span>':""}</button>`});
  m.innerHTML=h;m.onclick=e=>e.stopPropagation();
  m.querySelectorAll("button[data-v]").forEach(b=>b.onclick=()=>{sorts[p]=b.dataset.v;closeSort();renderCol(p)});
  document.body.appendChild(m);
};
function closeSort(){const m=$("sort-menu");if(m)m.remove();openMK=null}
document.addEventListener("click",closeSort);
window.addEventListener("scroll",closeSort,true);
window.addEventListener("resize",closeSort);

/* ═══ RENDER ═══ */
let renderTimer=null;
function renderAll(){if(renderTimer)clearTimeout(renderTimer);renderTimer=setTimeout(_doRender,16)}
function _doRender(){
  $("yr").textContent=new Date().getFullYear();
  renderFilter();
  const g=$("grid");g.innerHTML="";
  const keys=filterPerson?[filterPerson]:UK;
  keys.forEach(k=>{const d=document.createElement("div");d.id=`col-${k}`;g.appendChild(d);renderCol(k)});
  if(searchQuery)applySearch();
}

function renderFilter(){
  const f=$("filter");f.innerHTML="";
  const all=document.createElement("button");
  all.className=filterPerson===null?"act":"";
  all.innerHTML=`<span class="e">✦</span> Tous`;
  all.onclick=()=>{filterPerson=null;renderAll()};
  f.appendChild(all);
  UK.forEach(k=>{
    const u=USERS[k];
    const b=document.createElement("button");
    b.className=filterPerson===k?"act":"";
    b.innerHTML=`<span class="e">${eH(u)}</span> ${u.name}`;
    b.onclick=()=>{filterPerson=filterPerson===k?null:k;renderAll()};
    f.appendChild(b);
  });
}

function updateScrollIndicator(wrap){
  const c=wrap.querySelector(".cards");
  if(!c)return;
  wrap.classList.toggle("scrollable",c.scrollHeight>c.clientHeight+4);
}

function renderCol(p){
  const col=$(`col-${p}`);if(!col)return;
  const u=USERS[p],items=gifts[p]||[],sort=sorts[p]||"newest";
  const ac=u.color,ac2=u.color2;
  const total=items.reduce((s,i)=>s+(i.price||0),0);
  const sorted=[...items].sort((a,b)=>{
    if(sort==="newest")return b.createdAt-a.createdAt;
    if(sort==="oldest")return a.createdAt-b.createdAt;
    if(sort==="price-asc")return(a.price??Infinity)-(b.price??Infinity);
    if(sort==="price-desc")return(b.price??0)-(a.price??0);
    if(sort==="alpha")return a.name.localeCompare(b.name);
    return 0;
  });
  const sopts={newest:"🕐",oldest:"🕰️","price-asc":"💶↑","price-desc":"💸↓",alpha:"🔤"};

  let cH="";
  if(!sorted.length){cH=`<div class="empty"><span class="ei">✦</span>Aucune envie pour l'instant</div>`}
  else{
    sorted.forEach((it,i)=>{
      const img=it.img?`<img src="${esc(it.img)}" alt="${esc(it.name)}" loading="lazy">`:`<span class="ph">🎁</span>`;
      const lnk=it.link?`<a href="${esc(it.link)}" target="_blank" rel="noreferrer" class="lk">↗ Voir</a>`:"";
      const price=it.price!=null?`<span class="price">${fmt(it.price)}</span>`:"";
      cH+=`<div class="card" id="card-${it.id}" data-name="${esc(it.name.toLowerCase())}" data-desc="${esc((it.desc||'').toLowerCase())}" style="animation-delay:${Math.min(i*30,400)}ms">
        <button class="edt" onclick="window._edit('${p}','${it.id}')">✎</button>
        <button class="del" onclick="window._del('${p}','${it.id}')">✕</button>
        <div class="thumb">${img}</div>
        <div class="body">
          <h4>${esc(it.name)}</h4>
          ${it.desc?`<div class="desc">${esc(it.desc)}</div>`:""}
          <div class="foot">${price}${lnk}</div>
        </div>
      </div>`;
    });
  }

  const role=u.role?`<div class="col-role">${u.role}</div>`:"";
  const shortClass=sorted.length<=3?" short":"";

  col.innerHTML=`<div class="col" style="--ac:${ac};--ac2:${ac2}">
    <div class="col-head">
      <div class="col-info">
        <div class="col-em">${eH(u)}</div>
        <div class="col-meta">
          <div class="col-name">${u.name}</div>
          ${role}
          <div class="col-stats"><span class="b">${items.length}</span>${total?`<span>· ${fmt(total)}</span>`:""}</div>
        </div>
      </div>
      <button class="sort" onclick="window.openSort('${p}',event)">${sopts[sort]} <span class="a">▼</span></button>
    </div>
    <button class="add" onclick="window._openModal('${p}')"><span class="p">+</span> Ajouter une envie</button>
    <div class="cards-wrap"><div class="cards${shortClass}">${cH}</div></div>
  </div>`;

  // Update scroll fade
  requestAnimationFrame(()=>{
    const wrap=col.querySelector(".cards-wrap");
    if(wrap){updateScrollIndicator(wrap);wrap.querySelector(".cards").addEventListener("scroll",()=>{
      const c=wrap.querySelector(".cards");
      wrap.classList.toggle("scrollable",c.scrollTop+c.clientHeight<c.scrollHeight-4);
    })}
  });
}

/* ═══ ADD MODAL ═══ */
window._openModal=function(p){
  mPerson=p;mImg=null;editingId=null;
  $("m-t").textContent=`Ajouter un cadeau`;
  $("m-ok").innerHTML="✦ Ajouter";
  // Build who selector
  const who=$("m-who");who.innerHTML="";
  UK.forEach(k=>{
    const u=USERS[k];
    const b=document.createElement("button");
    b.className=mPerson===k?"sel":"";
    b.innerHTML=`<span class="e">${eH(u)}</span> ${u.name}`;
    b.onclick=()=>{mPerson=k;[...who.children].forEach(c=>c.classList.remove("sel"));b.classList.add("sel")};
    who.appendChild(b);
  });
  $("m-name").value="";$("m-price").value="";$("m-link").value="";$("m-desc").value="";
  $("m-pv").style.display="none";$("m-ph").style.display="";$("m-dz").classList.remove("hi","drg");$("m-img-info").textContent="";
  $("mo").classList.add("show");
  setTimeout(()=>$("m-name").focus(),300);
};
window.closeModal=function(){$("mo").classList.remove("show");mPerson=null;mImg=null;editingId=null};

window._edit=function(p,id){
  const it=gifts[p].find(i=>i.id===id);if(!it)return;
  mPerson=p;editingId=id;mImg=it.img||null;
  $("m-t").textContent=`Modifier le cadeau`;
  $("m-ok").innerHTML="✓ Enregistrer";
  const who=$("m-who");who.innerHTML="";
  UK.forEach(k=>{
    const u=USERS[k];
    const b=document.createElement("button");
    b.className=mPerson===k?"sel":"";
    b.innerHTML=`<span class="e">${eH(u)}</span> ${u.name}`;
    b.onclick=()=>{mPerson=k;[...who.children].forEach(c=>c.classList.remove("sel"));b.classList.add("sel")};
    who.appendChild(b);
  });
  $("m-name").value=it.name||"";
  $("m-price").value=it.price??"";
  $("m-link").value=it.link||"";
  $("m-desc").value=it.desc||"";
  if(mImg){$("m-pv").src=mImg;$("m-pv").style.display="block";$("m-ph").style.display="none";$("m-dz").classList.add("hi")}
  else{$("m-pv").style.display="none";$("m-ph").style.display="";$("m-dz").classList.remove("hi")}
  $("m-img-info").textContent="";
  $("mo").classList.add("show");
};

async function hFile(f){
  if(!f)return;
  try{
    $("m-img-info").textContent="Compression...";
    const r=await compressImage(f);
    if(r){
      mImg=r;
      $("m-pv").src=mImg;$("m-pv").style.display="block";
      $("m-ph").style.display="none";$("m-dz").classList.add("hi");
      $("m-img-info").textContent=`Image compressée (${Math.round(r.length*3/4/1024)} Ko)`;
    }
  }catch(e){toast(`❌ ${e.message}`,"error");$("m-img-info").textContent=""}
}
$("m-f").onchange=e=>hFile(e.target.files[0]);
const dz=$("m-dz");
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drg")};
dz.ondragleave=()=>dz.classList.remove("drg");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drg");hFile(e.dataTransfer.files[0])};

let saving=false;
$("m-ok").onclick=async()=>{
  if(saving)return;
  const name=$("m-name").value.trim();
  if(!name||!mPerson){$("modal").classList.add("shake");setTimeout(()=>$("modal").classList.remove("shake"),500);return}
  const rawPrice=$("m-price").value?Number($("m-price").value):null;
  const price=(rawPrice!=null&&rawPrice>=0)?rawPrice:null;
  let link=$("m-link").value.trim();
  if(link&&!/^https?:\/\//i.test(link))link="https://"+link;
  saving=true;$("m-ok").style.opacity=".5";
  const desc=$("m-desc").value.trim();
  try{
    if(editingId){
      // Find which column it currently lives in
      let oldCol=null,oldIdx=-1;
      for(const k of UK){const i=gifts[k].findIndex(g=>g.id===editingId);if(i!==-1){oldCol=k;oldIdx=i;break}}
      if(oldCol===null){toast("❌ Cadeau introuvable","error");return}
      const old=gifts[oldCol][oldIdx];
      const updated={...old,name,price,desc,link,img:mImg};
      if(oldCol===mPerson){gifts[mPerson][oldIdx]=updated}
      else{gifts[oldCol].splice(oldIdx,1);gifts[mPerson].push(updated)}
      const ok=await saveG();
      if(ok){closeModal();toast(`✓ "${name}" modifié`)}
      else{// revert
        if(oldCol===mPerson)gifts[mPerson][oldIdx]=old;
        else{gifts[mPerson].pop();gifts[oldCol].splice(oldIdx,0,old)}
        renderAll();
      }
    }else{
      gifts[mPerson].push({id:uid(),name,price,desc,link,img:mImg,createdAt:Date.now()});
      const ok=await saveG();
      if(ok){closeModal();burst();toast(`✦ "${name}" ajouté !`)}
      else{gifts[mPerson].pop();renderCol(mPerson)}
    }
  }finally{saving=false;$("m-ok").style.opacity=""}
};

/* ═══ DELETE WITH UNDO ═══ */
window._del=function(p,id){
  const c=$(`card-${id}`);if(!c)return;
  const idx=gifts[p].findIndex(i=>i.id===id);if(idx===-1)return;
  const deleted=gifts[p][idx];
  c.classList.add("removing");
  setTimeout(async()=>{
    gifts[p].splice(idx,1);
    renderCol(p);
    const ok=await saveG();
    if(!ok){gifts[p].splice(idx,0,deleted);renderCol(p);return}
    const t=document.createElement("div");
    t.className="toast undo";
    t.innerHTML=`🗑 "${esc(deleted.name)}" supprimé <button class="ub">Annuler</button><div class="ubar"></div>`;
    $("toasts").appendChild(t);
    const undone={v:false};
    t.querySelector(".ub").onclick=async()=>{
      undone.v=true;
      gifts[p].splice(idx,0,deleted);
      await saveG();renderCol(p);
      t.classList.add("removing");setTimeout(()=>t.remove(),300);
      toast(`✨ "${deleted.name}" restauré`);
    };
    setTimeout(()=>{if(!undone.v){t.classList.add("removing");setTimeout(()=>t.remove(),300)}},5000);
  },340);
};

/* ═══ ESC ═══ */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if($("mo").classList.contains("show"))closeModal();
    else if(openMK)closeSort();
  }
});

/* ═══ INIT ═══ */
let loaderHidden=false;
function hideLoader(){if(!loaderHidden){loaderHidden=true;$("loader").classList.add("hidden")}}
setTimeout(hideLoader,3000);
renderAll();
</script>
</body>
</html>
